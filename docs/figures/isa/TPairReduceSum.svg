<text x="871" y="340" class="halfLabel" text-anchor="middle" fill="#2D8B57">Lower half: pair-reduced results</text>
<text x="1003" y="340" class="halfLabel" text-anchor="middle" fill="#64748b">Upper half: filled with 0</text>

<rect x="40" y="400" width="1120" height="280" fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12" />
<rect x="40" y="400" width="1120" height="280" style="fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12" />
<text x="56" y="424" style="font-size: 13px; font-weight: 700; fill: #0f172a;">Procedure (conceptual)</text>
<text x="56" y="450" style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 11px; fill: #0f172a;" xml:space="preserve">
  <tspan x="56" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="56" dy="16">  halfCols = ceil(Cv / 2)</tspan>
  <tspan x="56" dy="16">  for k in 0..halfCols-1:</tspan>
  <tspan x="56" dy="16">    dst[r,k] = src0[r, 2k] + src0[r, 2k+1]   # pair-reduction sum</tspan>
  <tspan x="56" dy="16">  for j in halfCols..Cv-1:</tspan>
  <tspan x="56" dy="16">    dst[r,j] = 0                          # upper half is filled with 0</tspan>
</text>
<text x="56" y="540" style="font-size: 11px; fill: #64748b;">Constraints: dst and src0 same valid shape; DType = float or half; row-major layout.</text>
<text x="56" y="558" style="font-size: 11px; fill: #64748b;">Uses vcpadd instruction: adds every 2 adjacent elements and writes result to lower half of destination register.</text>

<text x="600" y="600" style="font-size: 13px; font-weight: 700; fill: #0f172a; text-anchor: middle;">Pair grouping (row r of src0)</text>
