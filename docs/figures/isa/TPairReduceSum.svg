<text x="40" y="46" class="title">TPAIRREDUCESUM</text>
<text x="40" y="72" class="subtitle">Pair-reduction sum: add every 2 adjacent elements, write results to the lower half of dst.</text>
<text x="40" y="92" class="meta">dst[i,k] = src0[i,2k] + src0[i,2k+1];  positions ⌈Cv/2⌉…Cv−1 in dst are filled with 0; inactive elements are also 0</text>
<text x="1160" y="92" class="meta" text-anchor="end">Legend: blue=even index; orange=odd index; green=result; gray=0</text>
