<!-- Procedure box -->
<rect x="40" y="502" width="1120" height="194" class="procBox" />
<text x="56" y="528" class="procTitle">Procedure (conceptual — Mode 2)</text>
<text x="56" y="554" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="56" dy="16">  block32 = src1[r, 0 .. 32B/sizeof(T)-1]   // RowMajor, 32 bytes per row</tspan>
  <tspan x="56" dy="16">  for c in 0..Cv-1:</tspan>
  <tspan x="56" dy="16">    dst[r,c] = src0[r,c] * broadcast_block(block32, c)</tspan>
</text>
<text x="56" y="644" class="smallLabel">broadcast_block: the 32B block is loaded via vlds (BLK mode) and naturally</text>
<text x="56" y="660" class="smallLabel">repeats within each vector repeat stride, providing row-wise broadcast.</text>
<text x="56" y="680" class="meta">Note: semantics apply to the valid region unless stated otherwise.</text>
