<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="TEXPANDS tile operation diagram">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#1D8E63"/></marker>
  <marker id="axisArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#64748b"/></marker>
</defs>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
.title { font-size: 30px; font-weight: 700; fill: #0f172a; }
.subtitle { font-size: 14px; fill: #334155; }
.meta { font-size: 12px; fill: #64748b; }
.frame { fill: white; }
.panel { fill: #E9F7F1; stroke: #e2e8f0; stroke-width: 1.5; rx: 14; }
.tileLabel { font-size: 14px; font-weight: 700; fill: #0f172a; }
.tileBorder { fill: none; stroke: #475569; stroke-width: 1.5; }
.cell { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
.cellMasked { fill: #e2e8f0; }
.cellHL { stroke-width: 2; }
.cellText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 10px; fill: #0f172a; }
.arrow { stroke-width: 1.5; fill: none; stroke-linejoin: round; stroke-linecap: round; }
.axisLine { stroke: #64748b; stroke-width: 1.5; fill: none; }
.axisText { font-size: 10px; fill: #64748b; font-weight: 700; }
.opCircle { fill: #ffffff; stroke-width: 2; }
.opRect { fill: #ffffff; stroke-width: 2; }
.opText { font-size: 10px; font-weight: 800; fill: #0f172a; }
.procBox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
.procTitle { font-size: 14px; font-weight: 700; fill: #0f172a; }
.procText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 12px; fill: #0f172a; }
.smallLabel { font-size: 12px; fill: #334155; }
.scalarBox { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
.scalarValue { font-size: 16px; font-weight: 700; }
.validBox { fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
</style>
<rect x="0" y="0" width="1200" height="720" class="frame" />
<rect x="24" y="24" width="1152" height="672" class="panel" />
<text x="40" y="46" class="title">TEXPANDS</text>
<text x="40" y="72" class="subtitle">Broadcast a scalar into a destination tile.</text>
<text x="40" y="92" class="meta">Template: scalar</text>
<text x="1160" y="92" class="meta" text-anchor="end">Legend: outline=example; dashed=valid rows/cols (Rv,Cv); shaded=masked; r down / c right; ortho arrows=dataflow</text>
<line x1="36" y1="104" x2="1164" y2="104" stroke="#e2e8f0" stroke-width="1.5" />
<!-- Formula -->
<text x="600" y="148" class="subtitle" text-anchor="middle" fill="#1D8E63">dst[r,c] = scalar</text>
<!-- Scalar input box, centered -->
<rect x="535" y="186" width="130" height="60" rx="10" class="scalarBox" />
<text x="600" y="208" class="smallLabel" text-anchor="middle">scalar</text>
<text x="600" y="234" class="scalarValue" fill="#1D8E63" text-anchor="middle">s</text>
<!-- Op box -->
<circle cx="600" cy="310" r="22" class="opCircle" stroke="#1D8E63" />
<rect x="583" y="293" width="34" height="34" rx="6" class="opRect" stroke="#1D8E63" />
<text x="600" y="308" class="opText" font-size="8px" text-anchor="middle">TEXPAN</text>
<text x="600" y="317" class="opText" font-size="8px" text-anchor="middle">DS</text>
<!-- Arrow: scalar -> op -->
<path d="M 600 246 L 600 288" class="arrow" stroke="#1D8E63" marker-end="url(#arrow)" />
<!-- dst tile -->
<text x="600" y="358" class="tileLabel" text-anchor="middle">dst</text>
<rect x="545" y="368" width="110" height="110" class="tileBorder" />
<rect x="545" y="368" width="22" height="22" class="cell" />
<rect x="567" y="368" width="22" height="22" class="cell" />
<rect x="589" y="368" width="22" height="22" class="cell" />
<rect x="611" y="368" width="22" height="22" class="cell" />
<rect x="633" y="368" width="22" height="22" class="cell cellMasked" />
<rect x="545" y="390" width="22" height="22" class="cell" />
<rect x="567" y="390" width="22" height="22" class="cell" />
<rect x="589" y="390" width="22" height="22" class="cell cellHL" stroke="#1D8E63" />
<rect x="611" y="390" width="22" height="22" class="cell" />
<rect x="633" y="390" width="22" height="22" class="cell cellMasked" />
<rect x="545" y="412" width="22" height="22" class="cell" />
<rect x="567" y="412" width="22" height="22" class="cell" />
<rect x="589" y="412" width="22" height="22" class="cell" />
<rect x="611" y="412" width="22" height="22" class="cell" />
<rect x="633" y="412" width="22" height="22" class="cell cellMasked" />
<rect x="545" y="434" width="22" height="22" class="cell" />
<rect x="567" y="434" width="22" height="22" class="cell" />
<rect x="589" y="434" width="22" height="22" class="cell" />
<rect x="611" y="434" width="22" height="22" class="cell" />
<rect x="633" y="434" width="22" height="22" class="cell cellMasked" />
<rect x="545" y="456" width="22" height="22" class="cell cellMasked" />
<rect x="567" y="456" width="22" height="22" class="cell cellMasked" />
<rect x="589" y="456" width="22" height="22" class="cell cellMasked" />
<rect x="611" y="456" width="22" height="22" class="cell cellMasked" />
<rect x="633" y="456" width="22" height="22" class="cell cellMasked" />
<rect x="545" y="368" width="88" height="88" class="validBox" stroke="#1D8E63" />
<text x="549" y="452" class="axisText">Rv</text>
<text x="629" y="380" class="axisText" text-anchor="end">Cv</text>
<path d="M 555 378 L 589 378" class="axisLine" marker-end="url(#axisArrow)" />
<path d="M 555 378 L 555 412" class="axisLine" marker-end="url(#axisArrow)" />
<text x="593" y="382" class="axisText">c</text>
<text x="553" y="416" class="axisText" text-anchor="end">r</text>
<!-- Arrow: op -> dst -->
<path d="M 600 332 L 600 368" class="arrow" stroke="#1D8E63" marker-end="url(#arrow)" />
<!-- Procedure box -->
<rect x="40" y="502" width="1120" height="194" class="procBox" />
<text x="56" y="528" class="procTitle">Procedure (conceptual)</text>
<text x="56" y="554" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="56" dy="16">  for c in 0..Cv-1:</tspan>
  <tspan x="56" dy="16">    dst[r,c] = scalar</tspan>
</text>
<text x="56" y="680" class="meta">Note: semantics apply to the valid region unless stated otherwise.</text>
</svg>
