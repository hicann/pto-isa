<!-- ==================== Procedure ==================== -->
<rect x="40" y="500" width="548" height="180" class="procBox" />
<text x="56" y="526" class="procTitle">Procedure — Scalar Form</text>
<text x="56" y="552" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="56" dy="16">  for c in 0..Cv-1:</tspan>
  <tspan x="56" dy="16">    dst_mask[r,c] = cmp(src[r,c], s)</tspan>
</text>

<rect x="612" y="500" width="548" height="180" class="procBox" />
<text x="628" y="526" class="procTitle">Procedure — Tile Form</text>
<text x="628" y="552" class="procText" xml:space="preserve">
  <tspan x="628" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="628" dy="16">  for c in 0..Cv-1:</tspan>
  <tspan x="628" dy="16">    dst_mask[r,c] = cmp(src0[r,c], src1[0,0])</tspan>
</text>

<text x="56" y="696" class="meta">Note: semantics apply to the valid region unless stated otherwise.</text>
