name: arm_compile_action

on:
  workflow_call:
    inputs:
      task_name:
        required: true
        type: string
      package_name:
        required: true
        type: string
      arch:
        required: false
        type: string
        default: 'x64'
      spec:
        required: false
        type: string
        default: 'large'
      image_version:
        required: true
        type: string
    outputs:
      arm_run_url:
        value: ${{jobs.JOB_compile.outputs.primary-url}}
      arm_run_key:
        value: ${{jobs.JOB_compile.outputs.primary-key}}
      package_name:
        value: ${{jobs.JOB_compile.outputs.package_name}}
jobs:
  JOB_compile:
    name: compile
    select: selected_by_default
    needs: []
    steps:
      -
        name: Checkout
        identifier: process_checkout
        uses: checkout
        with:
          ref: ${{ atomgit.event.pull_request.merge_commit_sha || atomgit.sha }}
          token: ${{secrets.GIT_TOKEN}}
      -
        name: download
        uses: obs-download
        with:
          endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
          bucket: "ascend-ci"
          access-key: ${{ secrets.AK }}
          secret-key: ${{ secrets.SK }}
          key: |
            ${{ env.obs_path }}/pr_filelist.txt
            ${{ env.obs_path }}/pr_filelist_mod.txt
            ${{ env.obs_path }}/update_file_detail.txt
            ${{ env.obs_path }}/compile.sh
          path: ${{ steps.process_checkout.outputs.path }}
      -
        name: compile_acc
        identifier: compile
        uses: build-accelerate
        with:
          command: |
            export WORKSPACE=${{ steps.process_checkout.outputs.path }}
            cd ${{ steps.process_checkout.outputs.path }}
            export task_name=${{ inputs.task_name }}
            export package_name=${{ inputs.package_name }}
            BuildAccelerate bash compile.sh
          AC_SERVER_IP: ${{ vars.AC_SERVER_IP }}
      - name: upload
        uses: obs-upload
        with:
          endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
          bucket: "ascend-ci"
          access-key: ${{ secrets.AK }}
          secret-key: ${{ secrets.SK }}
          artifact-path: "${{ steps.process_checkout.outputs.path }}/build_out/*.run"
          object-prefix: ${{ env.obs_path }}/
    if: "${{ default() }}"
    runs-on:
      - dedicate-hosted
      - ${{ inputs.arch }}
      - ${{ inputs.spec }}
    container:
      image: swr.cn-north-4.myhuaweicloud.com/ci_cann/${{ inputs.image_version }}
